name: mecanaut_mobile
description: "Mecanaut mobile app scaffolding in Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  dio: ^5.9.0
  flutter_secure_storage: ^10.1.0
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logo_white.png
    - assets/images/logo.svg
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/LogoSquare.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/LogoRound.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/LogoSemi.png
  android: true
  ios: true
